name: End-to-End Data Platform Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "config/**"
      - "data/sample/**"
      - "data/api_sample/**"
      - "notebooks/**"
      - "src/**"
      - "tests/**"
      - "powerbi/**"
      - ".github/workflows/end-to-end.yml"

jobs:
  validate-platform:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run end-to-end pipeline
        run: python notebooks/07_run_end_to_end_pipeline.py

      - name: Upload operations evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-operations-evidence
          path: data/operations/
          if-no-files-found: ignore
